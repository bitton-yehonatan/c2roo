<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="128" height="128" rx="28" fill="#0F172A"/>

  <!-- Left piece (purple) - has a tab pointing right -->
  <path d="
    M 22,28 L 54,28 L 54,48
    C 54,48 54,44 58,44 C 62,44 62,48 62,48
    L 62,56
    C 62,56 62,60 58,60 C 54,60 54,56 54,56
    L 54,76
    C 54,76 54,72 58,72 C 62,72 62,76 62,76
    L 62,84
    C 62,84 62,88 58,88 C 54,88 54,84 54,84
    L 54,100 L 22,100
    C 20,100 18,98 18,96 L 18,32
    C 18,30 20,28 22,28 Z
  " fill="url(#purple)"/>

  <!-- Right piece (green) - has sockets matching left tabs -->
  <path d="
    M 66,28 L 106,28
    C 108,28 110,30 110,32 L 110,96
    C 110,98 108,100 106,100
    L 66,100 L 66,84
    C 66,84 66,88 62,88 C 58,88 58,84 58,84
    L 58,76
    C 58,76 58,72 62,72 C 66,72 66,76 66,76
    L 66,56
    C 66,56 66,60 62,60 C 58,60 58,56 58,56
    L 58,48
    C 58,48 58,44 62,44 C 66,44 66,48 66,48
    L 66,28 Z
  " fill="url(#green)"/>

  <!-- Subtle gap line between pieces -->
  <line x1="60" y1="28" x2="60" y2="44" stroke="#0F172A" stroke-width="1.5"/>
  <line x1="60" y1="60" x2="60" y2="72" stroke="#0F172A" stroke-width="1.5"/>
  <line x1="60" y1="88" x2="60" y2="100" stroke="#0F172A" stroke-width="1.5"/>
</svg>
