<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200">
  <defs>
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333EA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rooGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9333EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="200" rx="16" fill="#0F172A"/>

  <!-- Claude Code icon (left) - stylized terminal bracket -->
  <g transform="translate(40, 40)">
    <rect width="120" height="120" rx="20" fill="url(#claudeGrad)" opacity="0.15"/>
    <text x="60" y="78" font-family="monospace" font-size="60" font-weight="bold" fill="url(#claudeGrad)" text-anchor="middle">&gt;_</text>
  </g>

  <!-- "c2roo" main text -->
  <text x="360" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">
    c<tspan fill="#9333EA">2</tspan>roo
  </text>

  <!-- Conversion arrow -->
  <g transform="translate(200, 110)">
    <line x1="0" y1="0" x2="320" y2="0" stroke="url(#arrowGrad)" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
    <!-- Arrow chevrons -->
    <polygon points="140,0 130,-6 130,6" fill="url(#arrowGrad)" opacity="0.5"/>
    <polygon points="180,0 170,-6 170,6" fill="url(#arrowGrad)" opacity="0.7"/>
    <polygon points="220,0 210,-6 210,6" fill="url(#arrowGrad)" opacity="0.9"/>
  </g>

  <!-- Roo Code icon (right) - stylized kangaroo/code bracket -->
  <g transform="translate(560, 40)">
    <rect width="120" height="120" rx="20" fill="url(#rooGrad)" opacity="0.15"/>
    <text x="60" y="78" font-family="monospace" font-size="60" font-weight="bold" fill="url(#rooGrad)" text-anchor="middle">{}</text>
  </g>

  <!-- Subtitle -->
  <text x="360" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94A3B8" text-anchor="middle" letter-spacing="3">
    CLAUDE CODE PLUGINS  &#x2192;  ROO CODE
  </text>

  <!-- Version badge -->
  <g transform="translate(320, 165)">
    <rect width="80" height="22" rx="11" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="40" y="15" font-family="monospace" font-size="11" fill="#94A3B8" text-anchor="middle">v0.1.0</text>
  </g>
</svg>
