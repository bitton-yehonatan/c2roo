<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="128" height="128" rx="28" fill="#0F172A"/>

  <!-- Conversion arrows (triple chevron) -->
  <g transform="translate(64, 38)" opacity="0.4">
    <polyline points="-12,-10 0,0 -12,10" fill="none" stroke="url(#grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="0,-10 12,0 0,10" fill="none" stroke="url(#grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- c2r text -->
  <text x="64" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">
    c<tspan fill="#9333EA">2</tspan>r
  </text>
</svg>
