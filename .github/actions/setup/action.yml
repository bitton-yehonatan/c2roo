name: Setup c2roo
description: Checkout, install UV, and sync dependencies

runs:
  using: composite
  steps:
    - name: Install UV
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12
      shell: bash

    - name: Sync dependencies
      run: uv sync --all-extras --dev
      shell: bash
